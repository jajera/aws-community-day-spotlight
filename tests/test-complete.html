<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Preview Test - Complete</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-icons">

                </svg>
            </button>
            <button id="theme-toggle" class="icon-button" aria-label="Toggle dark mode">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path class="sun-icon" d="M12 17.5c-3.038 0-5.5-2.462-5.5-5.5s2.462-5.5 5.5-5.5 5.5 2.462 5.5 5.5-2.462 5.5-5.5 5.5zm0-9c-1.933 0-3.5 1.567-3.5 3.5s1.567 3.5 3.5 3.5 3.5-1.567 3.5-3.5-1.567-3.5-3.5-3.5zm0-2c.552 0 1-.448 1-1v-2c0-.552-.448-1-1-1s-1 .448-1 1v2c0 .552.448 1 1 1zm0 14c-.552 0-1 .448-1 1v2c0 .552.448 1 1 1s1-.448 1-1v-2c0-.552-.448-1-1-1zm8-7c.552 0 1-.448 1-1s-.448-1-1-1h-2c-.552 0-1 .448-1 1s.448 1 1 1h2zm-14 0c-.552 0-1 .448-1 1s.448 1 1 1h2c.552 0 1-.448 1-1s-.448-1-1-1h-2zm12.071-5.071c.391.391 1.023.391 1.414 0l1.414-1.414c.391-.391.391-1.023 0-1.414s-1.023-.391-1.414 0l-1.414 1.414c-.391.391-.391 1.023 0 1.414zm-12.728 12.728c-.391-.391-1.023-.391-1.414 0l-1.414 1.414c-.391.391-.391 1.023 0 1.414s1.023.391 1.414 0l1.414-1.414c.391-.391.391-1.023 0-1.414zm1.414-12.728c.391-.391.391-1.023 0-1.414s-1.023-.391-1.414 0l-1.414 1.414c-.391.391-.391 1.023 0 1.414s1.023.391 1.414 0l1.414-1.414zm12.728 12.728c.391.391 1.023.391 1.414 0s.391-1.023 0-1.414l-1.414-1.414c-.391-.391-1.023-.391-1.414 0s-.391 1.023 0 1.414l1.414 1.414z"/>
                    <path class="moon-icon" style="display: none;" d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.46 0 .9-.04 1.34-.1-2.46-1.32-4.14-3.88-4.14-6.9 0-3.02 1.68-5.58 4.14-6.9-.44-.06-.88-.1-1.34-.1z"/>
                </svg>
            </button>
        </div>
    </header>

    <main class="main-container">
        <div class="form-section">
            <h1>Speaker Spotlight Generator</h1>
            <p style="margin-bottom: 1rem; color: var(--muted-color);">
                <strong>Testing Live Preview:</strong> Type in the form fields below and watch the preview update in real-time!
            </p>
            <form id="speaker-form" class="speaker-form">
                <div class="form-group">
                    <label for="speaker-name">Speaker Name</label>
                    <input type="text" id="speaker-name" name="speakerName" maxlength="60" required>
                    <div class="char-counter">
                        <span id="name-counter">0</span>/60
                    </div>
                </div>

                <div class="form-group">
                    <label for="topic-title">Topic Title</label>
                    <input type="text" id="topic-title" name="topicTitle" maxlength="100" required>
                    <div class="char-counter">
                        <span id="topic-counter">0</span>/100
                    </div>
                </div>

                <div class="form-group">
                    <label for="speaker-bio">Speaker Bio</label>
                    <textarea id="speaker-bio" name="speakerBio" maxlength="300" rows="4" required></textarea>
                    <div class="char-counter">
                        <span id="bio-counter">0</span>/300
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="event-date">Date</label>
                        <input type="date" id="event-date" name="eventDate" required>
                    </div>

                    <div class="form-group">
                        <label for="event-time">Time</label>
                        <input type="time" id="event-time" name="eventTime" value="00:00" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="event-format">Format</label>
                    <select id="event-format" name="eventFormat" required>
                        <option value="">Select format</option>
                        <option value="Virtual">Virtual</option>
                        <option value="In-Person">In-Person</option>
                        <option value="Hybrid">Hybrid</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="button" id="copy-text-btn" class="btn btn-secondary">
                        Copy Text
                    </button>
                    <button type="button" onclick="verifyLivePreview()" class="btn btn-secondary" style="margin-left: 10px;">
                        Test Live Preview
                    </button>
                </div>
            </form>
        </div>

        <div class="preview-section">
            <h2>Live Preview</h2>
            <div class="canvas-container">
                <canvas id="preview-canvas" width="800" height="600"></canvas>
            </div>
        </div>
    </main>

    <script src="vars.js"></script>
    <script src="app.js"></script>
    <script src="verify-live-preview.js"></script>
</body>
</html>
